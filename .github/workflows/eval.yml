name: Evaluation

on:
  schedule:
    # Run weekly on Sundays at midnight UTC
    - cron: "0 0 * * 0"
  workflow_dispatch:
    inputs:
      provider:
        description: "LLM provider (claude, openai, fallback)"
        required: false
        default: "fallback"
        type: choice
        options:
          - fallback
          - claude
          - openai
      category:
        description: "Filter to category (leave empty for all)"
        required: false
        default: ""
        type: string
      k:
        description: "Documents to retrieve"
        required: false
        default: "10"
        type: string

permissions:
  contents: read
  issues: write

jobs:
  evaluate:
    name: RAG Quality Evaluation
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run evaluation
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          PROVIDER="${{ github.event.inputs.provider || 'fallback' }}"
          CATEGORY="${{ github.event.inputs.category || '' }}"
          K="${{ github.event.inputs.k || '10' }}"

          ARGS="--provider $PROVIDER --k $K"
          if [ -n "$CATEGORY" ]; then
            ARGS="$ARGS --category $CATEGORY"
          fi

          bash scripts/run_eval.sh $ARGS

      - name: Check quality thresholds
        id: thresholds
        run: |
          python3 -c "
          import json, sys
          from pathlib import Path

          scores_file = Path('eval_results/latest_scores.json')
          if not scores_file.exists():
              print('ERROR: No scores file found')
              sys.exit(1)

          scores = json.loads(scores_file.read_text())

          THRESHOLDS = {
              'faithfulness': 0.7,
              'answer_relevancy': 0.7,
          }

          failed = False
          for metric, threshold in THRESHOLDS.items():
              stats = scores.get(metric, {})
              mean = stats.get('mean')
              if mean is None:
                  print(f'WARNING: {metric} not available')
                  continue
              if mean < threshold:
                  print(f'FAIL: {metric} = {mean:.4f} (threshold: {threshold})')
                  failed = True
              else:
                  print(f'PASS: {metric} = {mean:.4f} (threshold: {threshold})')

          if failed:
              print()
              print('Quality thresholds not met!')
              sys.exit(1)
          else:
              print()
              print('All quality thresholds passed.')
          "

      - name: Post job summary
        if: always()
        run: |
          python3 -c "
          import json, os
          from pathlib import Path

          scores_file = Path('eval_results/latest_scores.json')
          if not scores_file.exists():
              with open(os.environ['GITHUB_STEP_SUMMARY'], 'a') as f:
                  f.write('## Evaluation Results\n\nNo scores file generated.\n')
              exit()

          scores = json.loads(scores_file.read_text())

          lines = ['## RAG Evaluation Results\n']
          lines.append('| Metric | Mean | Std | Min | Max | Threshold | Status |')
          lines.append('|--------|------|-----|-----|-----|-----------|--------|')

          thresholds = {'faithfulness': 0.7, 'answer_relevancy': 0.7}
          for metric in ['faithfulness', 'answer_relevancy', 'context_precision', 'context_recall']:
              stats = scores.get(metric, {})
              mean = stats.get('mean')
              if mean is None:
                  lines.append(f'| {metric} | N/A | N/A | N/A | N/A | — | — |')
                  continue
              threshold = thresholds.get(metric)
              thr_str = f'{threshold}' if threshold else '—'
              status = ''
              if threshold:
                  status = ':white_check_mark:' if mean >= threshold else ':x:'
              lines.append(f'| {metric} | {mean:.4f} | {stats.get(\"std\", 0):.4f} | {stats.get(\"min\", 0):.4f} | {stats.get(\"max\", 0):.4f} | {thr_str} | {status} |')

          lines.append('')
          lines.append(f'**Questions evaluated:** {scores.get(\"count\", \"?\")}')

          with open(os.environ['GITHUB_STEP_SUMMARY'], 'a') as f:
              f.write('\n'.join(lines))
          "

      - name: Create issue on quality degradation
        if: failure() && steps.thresholds.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## RAG Quality Degradation Detected\n\n';
            body += 'The scheduled evaluation failed quality thresholds.\n\n';
            body += `**Run:** [${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})\n`;
            body += `**Date:** ${new Date().toISOString()}\n\n`;

            try {
              const scores = JSON.parse(fs.readFileSync('eval_results/latest_scores.json', 'utf-8'));
              const thresholds = {faithfulness: 0.7, answer_relevancy: 0.7};
              body += '| Metric | Score | Threshold | Status |\n|--------|-------|-----------|--------|\n';
              for (const [metric, threshold] of Object.entries(thresholds)) {
                const mean = scores[metric]?.mean;
                const status = mean >= threshold ? 'PASS' : 'FAIL';
                body += `| ${metric} | ${mean?.toFixed(4) || 'N/A'} | ${threshold} | ${status} |\n`;
              }
            } catch (e) {
              body += 'Could not read scores file.\n';
            }

            body += '\n**Action required:** Investigate recent changes that may have degraded RAG quality.';

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `RAG Quality Alert: Evaluation thresholds not met`,
              body: body,
              labels: ['quality', 'automated']
            });

      - name: Upload eval results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-results-${{ github.run_id }}
          path: eval_results/
          retention-days: 90
