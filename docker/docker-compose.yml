# =============================================================================
# RAG Pipeline — Docker Compose (Production)
# =============================================================================
# Services: api (FastAPI), chromadb (vector store), ui (Streamlit)
# Networks: backend (api <-> chromadb), frontend (ui <-> api)
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # FastAPI Backend
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    volumes:
      - chroma_data:/app/data/chroma
      - eval_results:/app/eval_results
    networks:
      - backend
      - frontend
    depends_on:
      chromadb:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 512M
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ---------------------------------------------------------------------------
  # ChromaDB Vector Store
  # ---------------------------------------------------------------------------
  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/v1/heartbeat').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Streamlit UI
  # ---------------------------------------------------------------------------
  ui:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ui
    ports:
      - "8501:8501"
    environment:
      - API_BASE_URL=http://api:8000
    networks:
      - frontend
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------
networks:
  backend:
    driver: bridge
    internal: true      # api <-> chromadb only, no external access
  frontend:
    driver: bridge      # ui <-> api, externally accessible

# ---------------------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------------------
volumes:
  chroma_data:
    driver: local
  eval_results:
    driver: local
